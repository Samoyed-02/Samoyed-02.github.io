baseURL = 'https://samoyed-02.github.io/'
languageCode = 'ko-kr'
title = 'Samoyed Devlog'
theme = 'PaperMod' # 다시 검증된 PaperMod로 고정
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[params]
    env = "production"
    description = "백엔드 개발 및 보안 기록 블로그"
    
    # 우측 목차(TOC) 기본 활성화
    ShowToc = true
    TocOpen = true
    showCodeCopyButtons = true

