baseURL = 'https://samoyed-02.github.io/'
languageCode = 'ko-kr'
title = 'Samoyed Devlog'
theme = 'PaperMod' # 다시 검증된 PaperMod로 고정

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[params]
    env = "production"
    description = "백엔드 개발 및 보안 기록 블로그"
    
    # 우측 목차(TOC) 기본 활성화
    ShowToc = true
    TocOpen = true
    showCodeCopyButtons = true
    mainSections = ["posts"]

[params.homeInfoParams]
  Title = "구경하다 가세요, 저도 아직 배우는 중이거든요 👋"
  Content = """
안정적인 서비스를 만들기 위해 동시성 처리와 장애 대응까지 고민하는 4학년 백엔드 개발자입니다.

### 🛠 기술 스택
- **Language**: Kotlin, Java, Python
- **Framework**: Spring Boot, Django, FastAPI
- **DB**: PostgreSQL, Redis
- **Tools**: Git, Docker

### 📌 주요 프로젝트
- **[Guard-up](/projects/guard-up/)** — RAG 기반 계약서 조항 분석 앱 (CLOVA OCR, KLUE-NER, GPT-4o)
- **[PickStranger](/projects/pickstranger/)** — gRPC 기반 로그인 위험도 분석 리버스 프록시
- **[남한산성 관광 앱](/projects/namhansanseong/)** — FastAPI + PostGIS + Kakao Maps 연동 여행 서비스
"""

